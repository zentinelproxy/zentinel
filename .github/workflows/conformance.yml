# Gateway API Conformance Tests
#
# Builds the gateway controller and proxy, deploys to a kind cluster,
# and runs the official Gateway API conformance test suite.
#
# Runs on PRs that touch the gateway crate or conformance tests.

name: Conformance

on:
  pull_request:
    paths:
      - 'crates/gateway/**'
      - 'conformance/**'
      - 'deploy/helm/zentinel-gateway/**'
      - '.github/workflows/conformance.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GATEWAY_IMAGE: zentinel-gateway:ci
  PROXY_IMAGE: zentinel:ci
  CLUSTER_NAME: zentinel-conformance

jobs:
  conformance:
    name: Gateway API Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          # conformance/go.mod requires Go >= 1.25.0. Must stay in sync with
          # the `go` directive in that file.
          go-version: '1.25'
          cache-dependency-path: conformance/go.sum

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-conformance-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build gateway controller
        run: cargo build --release --package zentinel-gateway

      - name: Build proxy
        run: cargo build --release --package zentinel-proxy

      - name: Build Docker images
        run: |
          docker build -t $GATEWAY_IMAGE --target gateway .
          docker build -t $PROXY_IMAGE --target proxy .

      # helm/kind-action's `config` parameter passes its value straight to
      # `kind create cluster --config`, which expects a file path. Older
      # releases of the action did not write inline YAML to a temp file
      # first, so passing the config inline produced
      #   `failed to create cluster: error reading file: open kind: Cluster ...`
      # because the YAML body itself was being treated as a filename.
      # Write the config to a real file and reference it by path so this
      # works regardless of which action version the @v1 tag resolves to.
      - name: Write kind cluster config
        run: |
          cat > /tmp/kind-config.yaml <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
          EOF

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          config: /tmp/kind-config.yaml

      - name: Load images into kind
        run: |
          kind load docker-image $GATEWAY_IMAGE --name $CLUSTER_NAME
          kind load docker-image $PROXY_IMAGE --name $CLUSTER_NAME

      - name: Install Gateway API CRDs
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/experimental-install.yaml

      # The Helm chart renders the image as
      #   "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      # so passing the full `name:tag` as repository + an empty tag yields
      # `zentinel-gateway:ci:<chart-version>`, which kind rejects with
      # `InvalidImageName`. Split the `IMAGE_NAME:TAG` env vars into
      # repository and tag using bash parameter expansion so the chart
      # template renders the correct reference.
      # Deploy without --wait so helm returns immediately after applying the
      # manifests. Readiness is then waited on separately below with a longer
      # timeout, so we can dump pod state during the wait if needed.
      - name: Deploy zentinel-gateway
        run: |
          kubectl create namespace zentinel-system
          helm install zentinel-gateway deploy/helm/zentinel-gateway \
            --namespace zentinel-system \
            --set image.repository="${GATEWAY_IMAGE%:*}" \
            --set image.tag="${GATEWAY_IMAGE##*:}" \
            --set image.pullPolicy=Never \
            --set proxy.image.repository="${PROXY_IMAGE%:*}" \
            --set proxy.image.tag="${PROXY_IMAGE##*:}" \
            --set proxy.image.pullPolicy=Never

          echo "=== Rendered manifest (first 200 lines) ==="
          helm get manifest zentinel-gateway -n zentinel-system | head -200

          echo "=== Initial pod state ==="
          kubectl get pods -n zentinel-system -o wide

      - name: Wait for readiness
        run: |
          set +e
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=zentinel-gateway \
            -n zentinel-system \
            --timeout=300s
          WAIT_RC=$?
          set -e

          echo "=== Pod state after wait (rc=$WAIT_RC) ==="
          kubectl get pods -n zentinel-system -o wide

          if [ "$WAIT_RC" -ne 0 ]; then
            echo "::error::Pods did not reach Ready within 300s"
            exit "$WAIT_RC"
          fi

          echo "GatewayClass status:"
          kubectl get gatewayclass zentinel -o yaml

      - name: Run conformance tests
        working-directory: conformance
        run: |
          go test ./... \
            -run TestConformance \
            -gateway-class=zentinel \
            -controller-name=zentinelproxy.io/gateway-controller \
            -supported-features=HTTPRoute,ReferenceGrant \
            -v \
            -count=1 \
            -timeout=20m

      - name: Collect logs on failure
        if: failure()
        run: |
          # Best-effort: any of these may produce nothing if the cluster
          # never reached the corresponding state. Do not exit on error so
          # we collect every signal we can.
          set +e

          echo "=== Pod state ==="
          kubectl get pods -n zentinel-system -o wide
          echo
          kubectl get pods -n zentinel-system -o yaml

          echo "=== Pod descriptions (events, container statuses, probes) ==="
          kubectl describe pods -n zentinel-system

          echo "=== Namespace events (chronological) ==="
          kubectl get events -n zentinel-system --sort-by='.lastTimestamp'

          echo "=== Controller logs (full) ==="
          kubectl logs -l app.kubernetes.io/name=zentinel-gateway -n zentinel-system -c controller
          echo "=== Controller logs (previous, if restarted) ==="
          kubectl logs -l app.kubernetes.io/name=zentinel-gateway -n zentinel-system -c controller --previous

          echo "=== Proxy logs (full) ==="
          kubectl logs -l app.kubernetes.io/name=zentinel-gateway -n zentinel-system -c proxy
          echo "=== Proxy logs (previous, if restarted) ==="
          kubectl logs -l app.kubernetes.io/name=zentinel-gateway -n zentinel-system -c proxy --previous

          echo "=== Gateway resources ==="
          kubectl get gateways,httproutes,gatewayclasses -A -o yaml

          echo "=== Helm release ==="
          helm status zentinel-gateway -n zentinel-system || true

          true
