version: 2
updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Group minor/patch updates to reduce noise
      rust-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # wasmtime and wasmtime-wasi must move together: their major
      # versions are tightly coupled, and bumping one without the
      # other produces uncompilable code (e.g. wasmtime 44 with
      # wasmtime-wasi 43 fails to type-check ResourceTable/Linker).
      wasmtime:
        patterns:
          - "wasmtime"
          - "wasmtime-*"
        update-types:
          - "major"
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "rust"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
      - "docker"
